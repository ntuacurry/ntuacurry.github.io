<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熱門族群新聞</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap');

    /* ── Dark theme (night: 18:00–06:00 Taiwan) ── */
    [data-theme="dark"] {
      --bg:        #08090f;
      --surface:   #0e1018;
      --surface2:  #141721;
      --border:    #1f2338;
      --border2:   #252a40;
      --gold:      #f0b429;
      --gold-dim:  #7a5c14;
      --text:      #dde0f0;
      --dim:       #5a6080;
      --dim2:      #3a3f58;
      --tag-bg:    #1c2040;
      --tag-text:  #6b9fff;
      --input-bg:  #141721;
      --logo-color:#08090f;
      --grid-line: rgba(240,180,41,.022);
      --chip-bg:   #141721;
      --err-bg:    rgba(239,68,68,.07);
      --err-border:rgba(239,68,68,.25);
      --err-text:  #fca5a5;
      --shadow:    none;
    }

    /* ── Light theme (day: 06:00–18:00 Taiwan) ── */
    [data-theme="light"] {
      --bg:        #f5f4ef;
      --surface:   #ffffff;
      --surface2:  #f0ede6;
      --border:    #e0dbd0;
      --border2:   #d4cfc4;
      --gold:      #b8860b;
      --gold-dim:  #c8a020;
      --text:      #1a1a2e;
      --dim:       #7a7060;
      --dim2:      #b0a890;
      --tag-bg:    #e8f0ff;
      --tag-text:  #3060c0;
      --input-bg:  #ffffff;
      --logo-color:#ffffff;
      --grid-line: rgba(180,140,10,.04);
      --chip-bg:   #ffffff;
      --err-bg:    rgba(200,50,50,.06);
      --err-border:rgba(200,50,50,.25);
      --err-text:  #b02020;
      --shadow:    0 1px 4px rgba(0,0,0,.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 40px 40px;
      transition: background .3s, color .3s;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 13px 24px 11px;
      transition: background .3s, border-color .3s;
    }

    .header-top {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 11px;
    }

    .logo-mark {
      width: 30px; height: 30px; flex-shrink: 0;
      background: var(--gold);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: background .3s;
    }

    h1 {
      font-size: 15px; font-weight: 700; letter-spacing: .02em;
      color: var(--gold); transition: color .3s;
    }

    .subtitle {
      font-size: 10px; color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 1px; letter-spacing: .05em;
    }

    /* theme toggle */
    .theme-btn {
      margin-left: auto;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 20px; padding: 4px 10px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--dim); cursor: pointer; white-space: nowrap;
      transition: all .2s;
      display: flex; align-items: center; gap: 5px;
    }
    .theme-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

    /* ── FILTER ── */
    .filter-wrap {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }

    /* tab: range / day / search */
    .mode-tabs {
      display: flex; gap: 3px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 7px; padding: 3px;
    }

    .mode-tab {
      padding: 4px 11px;
      border-radius: 5px; border: none;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      cursor: pointer; transition: all .15s; letter-spacing: .03em;
      background: transparent; color: var(--dim);
    }
    .mode-tab.on {
      background: var(--gold); color: var(--logo-color);
      font-weight: 700;
    }
    [data-theme="light"] .mode-tab.on { color: #fff; }

    /* panels */
    .filter-panel { display: none; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-panel.on { display: flex; }

    .date-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 7px; padding: 6px 12px;
      transition: border-color .15s;
    }
    .date-pill:focus-within { border-color: var(--gold-dim); }

    .date-pill label {
      font-size: 10px; font-family: 'JetBrains Mono', monospace;
      color: var(--dim); white-space: nowrap; letter-spacing: .06em;
    }

    input[type="date"] {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer; min-width: 108px;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(.5) sepia(1) hue-rotate(5deg); cursor: pointer;
    }
    [data-theme="light"] input[type="date"]::-webkit-calendar-picker-indicator {
      filter: none; cursor: pointer;
    }

    .sep { color: var(--dim2); font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    /* search input */
    .search-pill {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 7px; padding: 6px 12px; min-width: 240px;
      transition: border-color .15s;
    }
    .search-pill:focus-within { border-color: var(--gold-dim); }
    .search-pill span { font-size: 13px; color: var(--dim); }

    input[type="text"] {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 13px;
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      width: 100%;
    }
    input[type="text"]::placeholder { color: var(--dim2); }

    /* quick range buttons */
    .quick-group { display: flex; gap: 4px; }

    .q-btn {
      padding: 5px 11px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 5px; color: var(--dim);
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      cursor: pointer; transition: all .14s; letter-spacing: .03em;
    }
    .q-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .q-btn.on {
      background: color-mix(in srgb, var(--gold) 15%, transparent);
      border-color: var(--gold-dim); color: var(--gold);
    }

    .go-btn {
      padding: 6px 15px;
      background: var(--gold); border: none; border-radius: 5px;
      color: #fff; font-size: 11px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer; letter-spacing: .05em;
      transition: all .14s;
    }
    [data-theme="dark"] .go-btn { color: #08090f; }
    .go-btn:hover { filter: brightness(1.1); }
    .go-btn:active { transform: scale(.97); }

    /* ── MAIN ── */
    main { max-width: 960px; margin: 0 auto; padding: 18px 24px 52px; }

    /* ── STATUS ── */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; flex-wrap: wrap;
    }

    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
      50%      { opacity: .6; box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }

    .chip {
      padding: 3px 11px; border-radius: 20px;
      border: 1px solid var(--border2); background: var(--chip-bg);
      font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--dim);
      box-shadow: var(--shadow);
    }
    .chip strong { color: var(--gold); }

    /* ── DAY GROUP ── */
    .day-block { margin-bottom: 20px; }

    .day-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 7px;
    }

    .day-label {
      font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
      color: var(--gold); letter-spacing: .06em; white-space: nowrap;
    }

    .day-dow {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--tag-text); background: var(--tag-bg);
      border: 1px solid color-mix(in srgb, var(--tag-text) 20%, transparent);
      border-radius: 3px; padding: 1px 7px; white-space: nowrap;
    }

    .day-rule {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border2) 0%, transparent 100%);
    }

    .day-count {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--dim2);
      white-space: nowrap;
    }

    /* ── NEWS ROW ── */
    .news-row {
      position: relative;
      display: grid; grid-template-columns: 46px 1fr; gap: 0 13px;
      align-items: start;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 14px; margin-bottom: 4px;
      overflow: hidden;
      transition: background .14s, border-color .14s, transform .14s, box-shadow .14s;
      box-shadow: var(--shadow);
    }

    .news-row::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 2px;
      background: var(--gold); opacity: 0; transition: opacity .14s;
    }

    .news-row:hover {
      background: var(--surface2); border-color: var(--gold-dim);
      transform: translateX(3px);
    }
    .news-row:hover::before { opacity: 1; }

    .news-time {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--dim2); letter-spacing: .02em; padding-top: 2px;
    }

    .news-title { font-size: 13.5px; line-height: 1.6; }

    .news-title a {
      color: var(--text); text-decoration: none; transition: color .13s;
    }
    .news-title a:hover { color: var(--gold); }
    .news-title a::after {
      content: ' ↗'; font-size: 9px; opacity: 0;
      transition: opacity .13s; color: var(--gold-dim);
    }
    .news-title a:hover::after { opacity: 1; }

    .no-link { color: var(--dim); }

    /* search highlight */
    mark {
      background: color-mix(in srgb, var(--gold) 30%, transparent);
      color: var(--text); border-radius: 2px; padding: 0 1px;
    }

    /* ── STATES ── */
    .state { text-align: center; padding: 60px 20px; color: var(--dim); }
    .state-icon { font-size: 40px; margin-bottom: 12px; opacity: .35; }
    .state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
    .state p  { font-size: 11px; font-family: 'JetBrains Mono', monospace; }

    .spinner {
      width: 30px; height: 30px; margin: 0 auto 13px;
      border: 2px solid var(--border2); border-top-color: var(--gold);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .err-box {
      background: var(--err-bg); border: 1px solid var(--err-border);
      border-radius: 7px; padding: 11px 14px;
      color: var(--err-text); font-size: 12px;
      font-family: 'JetBrains Mono', monospace; margin-bottom: 14px;
    }

    @media (max-width: 600px) {
      header { padding: 11px 14px 9px; }
      main   { padding: 13px 13px 40px; }
      .news-row { grid-template-columns: 1fr; gap: 2px; }
      .search-pill { min-width: 160px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-mark">📈</div>
    <div>
      <h1>熱門族群新聞</h1>
      <div class="subtitle" id="tw-time">TAIWAN TIME · --:--</div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙 暗色</button>
  </div>

  <div class="filter-wrap">
    <!-- Mode tabs -->
    <div class="mode-tabs">
      <button class="mode-tab on" data-mode="range" onclick="switchMode('range',this)">區間</button>
      <button class="mode-tab"    data-mode="day"   onclick="switchMode('day',this)">單日</button>
      <button class="mode-tab"    data-mode="search" onclick="switchMode('search',this)">搜尋</button>
    </div>

    <!-- Panel: date range -->
    <div class="filter-panel on" id="panel-range">
      <div class="date-pill">
        <label>FROM</label>
        <input type="date" id="sd">
        <span class="sep">–</span>
        <label>TO</label>
        <input type="date" id="ed">
      </div>
      <div class="quick-group">
        <button class="q-btn" data-days="7"  onclick="setQ(this)">7D</button>
        <button class="q-btn on" data-days="30" onclick="setQ(this)">30D</button>
        <button class="q-btn" data-days="90" onclick="setQ(this)">90D</button>
        <button class="q-btn" data-days="0"  onclick="setQ(this)">ALL</button>
      </div>
      <button class="go-btn" onclick="render()">FILTER</button>
    </div>

    <!-- Panel: single day -->
    <div class="filter-panel" id="panel-day">
      <div class="date-pill">
        <label>日期</label>
        <input type="date" id="sd-single">
      </div>
      <button class="go-btn" onclick="render()">FILTER</button>
    </div>

    <!-- Panel: search -->
    <div class="filter-panel" id="panel-search">
      <div class="search-pill">
        <span>🔍</span>
        <input type="text" id="keyword" placeholder="搜尋新聞標題…"
               oninput="render()" autocomplete="off">
      </div>
    </div>
  </div>
</header>

<main>
  <div id="err"></div>
  <div id="status" style="display:none" class="status-bar">
    <div class="live-dot"></div>
    <div class="chip"><strong id="cnt">0</strong> 筆新聞</div>
    <div class="chip" id="range-chip"></div>
  </div>
  <div id="feed">
    <div class="state"><div class="spinner"></div><h3>載入資料中…</h3><p>從 Google Sheets 取得 CSV</p></div>
  </div>
</main>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxAhYyyPNAgvSGDDfFUM36dqwIC4KCxysWibJRyn7zvqiz-d351uaNNV7DekJiO58q4YrueFU_Sg4v/pub?gid=565666579&single=true&output=csv';

let allRows   = [];
let minDate   = '';
let maxDate   = '';
let curMode   = 'range';
let manualTheme = false;

// ── Theme: auto by Taiwan time ──
function getTaiwanHour() {
  const now = new Date();
  // Taiwan is UTC+8
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const tw  = new Date(utc + 8 * 3600000);
  return tw.getHours();
}

function applyAutoTheme() {
  if (manualTheme) return;
  const h = getTaiwanHour();
  const isDay = h >= 6 && h < 18;
  setTheme(isDay ? 'light' : 'dark');
}

function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-btn');
  btn.textContent = t === 'dark' ? '☀️ 亮色' : '🌙 暗色';
}

function toggleTheme() {
  manualTheme = true;
  const cur = document.documentElement.getAttribute('data-theme');
  setTheme(cur === 'dark' ? 'light' : 'dark');
}

// ── Taiwan clock in subtitle ──
function updateClock() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const tw  = new Date(utc + 8 * 3600000);
  const hh  = String(tw.getHours()).padStart(2,'0');
  const mm  = String(tw.getMinutes()).padStart(2,'0');
  const ss  = String(tw.getSeconds()).padStart(2,'0');
  document.getElementById('tw-time').textContent =
    `TAIWAN TIME · ${hh}:${mm}:${ss}`;
}

// ── Mode switching ──
function switchMode(mode, btn) {
  curMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.filter-panel').forEach(p => p.classList.remove('on'));
  document.getElementById('panel-' + mode).classList.add('on');
  // clear err and re-render
  clearErr();
  if (mode === 'search') {
    document.getElementById('keyword').focus();
    render();
  } else {
    render();
  }
}

// ── Quick range ──
function setQ(btn) {
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  applyRange(Number(btn.dataset.days));
  render();
}

function applyRange(days) {
  if (!maxDate) return;
  if (days === 0) {
    document.getElementById('sd').value = minDate;
    document.getElementById('ed').value = maxDate;
    return;
  }
  const end   = new Date(maxDate + 'T12:00:00');
  const start = new Date(end);
  start.setDate(start.getDate() - (days - 1));
  const minD  = new Date(minDate + 'T12:00:00');
  document.getElementById('sd').value = fmt(start < minD ? minD : start);
  document.getElementById('ed').value = fmt(end);
}

// ── Fetch CSV ──
async function fetchCSV() {
  setFeed('<div class="state"><div class="spinner"></div><h3>載入資料中…</h3><p>正在取得 Google Sheets CSV</p></div>');
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    allRows = parseCSV(text);
    if (!allRows.length) throw new Error('CSV 無資料');

    const dates = allRows.map(r => r.date).filter(Boolean).sort();
    minDate = dates[0];
    maxDate = dates[dates.length - 1];

    // set input bounds
    for (const id of ['sd','ed','sd-single']) {
      const el = document.getElementById(id);
      el.min = minDate; el.max = maxDate;
    }
    // single day default = latest
    document.getElementById('sd-single').value = maxDate;

    applyRange(30);
    render();
  } catch(e) {
    showErr('無法載入資料：' + e.message);
    setFeed('');
  }
}

// ── CSV parser ──
function parseCSV(text) {
  const lines = text.replace(/\r\n?/g, '\n').trim().split('\n');
  if (lines.length < 2) return [];
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitLine(lines[i]);
    if (cols.length < 4) continue;
    const date  = cols[0].trim();
    const dow   = cols[1].trim();
    const time  = cols[2].trim().slice(0, 5);
    const title = cols[3].trim();
    const url   = (cols[4] || '').trim();
    if (!date && !title) continue;
    rows.push({ date, dow, time, title, url });
  }
  return rows;
}

function splitLine(line) {
  const out = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
    else if (c === ',' && !inQ) { out.push(cur); cur = ''; }
    else cur += c;
  }
  out.push(cur); return out;
}

// ── Render ──
function render() {
  clearErr();
  let filtered = [];
  let rangeLabel = '';

  if (curMode === 'range') {
    const sd = document.getElementById('sd').value;
    const ed = document.getElementById('ed').value;
    if (sd && ed && sd > ed) { showErr('開始日期不能晚於結束日期'); return; }
    const s = sd ? new Date(sd + 'T00:00:00') : null;
    const e = ed ? new Date(ed + 'T23:59:59') : null;
    filtered = allRows.filter(r => {
      if (!r.date) return true;
      const d = new Date(r.date + 'T12:00:00');
      if (s && d < s) return false;
      if (e && d > e) return false;
      return true;
    });
    rangeLabel = (sd && ed) ? sd + ' ～ ' + ed : '全部資料';

  } else if (curMode === 'day') {
    const day = document.getElementById('sd-single').value;
    if (!day) { filtered = []; rangeLabel = '請選擇日期'; }
    else {
      filtered = allRows.filter(r => r.date === day);
      rangeLabel = day;
    }

  } else { // search
    const kw = document.getElementById('keyword').value.trim();
    if (!kw) { filtered = [...allRows]; rangeLabel = '全部資料（搜尋模式）'; }
    else {
      filtered = allRows.filter(r =>
        r.title.toLowerCase().includes(kw.toLowerCase())
      );
      rangeLabel = `「${kw}」搜尋結果`;
    }
  }

  // sort: newest first
  filtered.sort((a,b) => {
    const ka = (a.date||'') + (a.time||'');
    const kb = (b.date||'') + (b.time||'');
    return kb.localeCompare(ka);
  });

  // status
  document.getElementById('cnt').textContent = filtered.length.toLocaleString();
  document.getElementById('range-chip').textContent = rangeLabel;
  document.getElementById('status').style.display = allRows.length ? 'flex' : 'none';

  if (!filtered.length) {
    setFeed('<div class="state"><div class="state-icon">🔍</div><h3>沒有符合條件的新聞</h3><p>請調整篩選條件</p></div>');
    return;
  }

  const kw = curMode === 'search' ? document.getElementById('keyword').value.trim() : '';

  // group by date
  const groups = {};
  for (const r of filtered) {
    const key = r.date || '(未知日期)';
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  }

  const html = Object.keys(groups)
    .sort((a,b) => b.localeCompare(a))
    .map(date => {
      const rows = groups[date];
      const dow  = rows[0].dow || '';
      return `
        <div class="day-block">
          <div class="day-header">
            <span class="day-label">${esc(date)}</span>
            ${dow ? `<span class="day-dow">${esc(dow)}</span>` : ''}
            <div class="day-rule"></div>
            <span class="day-count">${rows.length} 則</span>
          </div>
          ${rows.map(r => {
            const titleDisp = kw ? highlight(r.title, kw) : esc(r.title);
            const inner = r.url
              ? `<a href="${esc(r.url)}" target="_blank" rel="noopener noreferrer">${titleDisp}</a>`
              : `<span class="no-link">${titleDisp}</span>`;
            return `
              <div class="news-row">
                <div class="news-time">${esc(r.time || '—')}</div>
                <div class="news-title">${inner}</div>
              </div>`;
          }).join('')}
        </div>`;
    }).join('');

  setFeed(html);
}

// highlight keyword in title
function highlight(text, kw) {
  if (!kw) return esc(text);
  const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return esc(text).replace(re, m => `<mark>${m}</mark>`);
}

// ── Utils ──
function setFeed(h) { document.getElementById('feed').innerHTML = h; }
function showErr(m) { document.getElementById('err').innerHTML = `<div class="err-box">⚠ ${esc(m)}</div>`; }
function clearErr() { document.getElementById('err').innerHTML = ''; }
function fmt(d)     { return d.toISOString().slice(0,10); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──
window.addEventListener('DOMContentLoaded', () => {
  applyAutoTheme();
  updateClock();
  setInterval(updateClock, 1000);
  // re-check auto theme every minute (respects manual override)
  setInterval(() => { if (!manualTheme) applyAutoTheme(); }, 60000);
  fetchCSV();
});
</script>
